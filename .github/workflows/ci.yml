name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_CXX_STANDARD=20

      - name: Build
        run: cmake --build build

      - name: Test
        run: ./build/tests

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          find include src tests bench -name '*.h' -o -name '*.cpp' \
            | xargs clang-format --dry-run --Werror

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (generate compile_commands.json)
        run: cmake -B build -DCMAKE_CXX_STANDARD=20 -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          find include -name '*.h' \
            | xargs clang-tidy -p build
